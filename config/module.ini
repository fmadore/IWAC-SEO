[info]
name              = "DRE SEO"
description       = "Search-engine optimisation and XML sitemap for the Africa Multiple DRE Omeka S instance. Injects per-page meta description, Open Graph & Twitter cards, canonical links and schema.org JSON-LD — set by hand for static site pages, derived automatically for every resource page from its metadata and resource template. Serves /sitemap.xml (index + per-type children) and /robots.txt, lets an admin paste the Google Search Console verification snippet, and can ping IndexNow when content changes. Settings-only; installs and uninstalls cleanly."
author            = "Frédérick Madore"
configurable      = true
version           = "0.3.0"
module_link       = "https://github.com/AM-Digital-Research-Environment/DRE-SEO"
author_link       = "https://www.frederickmadore.com"
omeka_version_constraint = "^4.2.0"
