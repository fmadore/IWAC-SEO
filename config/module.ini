[info]
name              = "IWAC SEO"
description       = "Search-engine optimisation, citation tools and XML sitemap for the Islam West Africa Collection (IWAC) Omeka S instance. Injects per-page meta description, Open Graph & Twitter cards, canonical links and schema.org JSON-LD — set by hand for static site pages, derived automatically for every resource page from its metadata and resource class. Emits Highwire/Dublin Core citation tags and Zotero RDF (unAPI) for reference managers, and drives a public per-item 'How to cite' panel (Chicago/APA/MLA, copy-to-clipboard) with BibTeX/RIS/CSL-JSON downloads. Serves /sitemap.xml (index + per-type children) and /robots.txt, lets an admin paste the Google Search Console verification snippet, and can ping IndexNow when content changes. Settings-only; installs and uninstalls cleanly."
author            = "Frédérick Madore"
configurable      = true
version           = "0.5.1"
module_link       = "https://github.com/fmadore/IWAC-SEO"
author_link       = "https://www.frederickmadore.com"
omeka_version_constraint = "^4.2.0"
